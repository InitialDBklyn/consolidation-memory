name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Required for creating GitHub Releases
  id-token: write   # Required for trusted publishing (OIDC)

jobs:
  release_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[fastembed,dev]"

      - name: Run full novelty evaluation
        run: python -m benchmarks.novelty_eval --mode full --output benchmarks/results/novelty_eval_release_full.json

      - name: Enforce mandatory release gates
        run: >
          python scripts/verify_release_gates.py
          --novelty-result benchmarks/results/novelty_eval_release_full.json
          --scope-use-case "Drift-aware debugging memory"
          --output benchmarks/results/release_gate_report.json

      - name: Upload release gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: |
            benchmarks/results/novelty_eval_release_full.json
            benchmarks/results/release_gate_report.json

  build:
    needs: release_gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## [0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          generate_release_notes: false
